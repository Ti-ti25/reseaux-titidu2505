<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Titidu2505</title>
    <style>
        body {
            background-color: #010101;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .contact-container {
            background-color: #121212;
            border: 1px solid #27272a;
            padding: 2.5rem;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #fe2c55; /* Rose TikTok d'origine */
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            color: #a1a1aa;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: #010101;
            border: 1px solid #27272a;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #00f2fe; /* Cyan TikTok au focus */
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: #fe2c55;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #ff0055;
            box-shadow: 0 0 15px #ff0055;
            transform: scale(1.02);
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #00f2fe;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        .status-msg {
            padding: 0.8rem;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
