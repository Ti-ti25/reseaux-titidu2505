<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Tristan</title>
    <style>
        body {
            background-color: #010101;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .contact-container {
            background-color: #121212;
            border: 1px solid #27272a;
            padding: 2.5rem;
            border-radius: 16px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #fe2c55; /* Rose TikTok */
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
            color: #a1a1aa;
        }
        input, textarea {
            width: 100%;
            padding: 0.8rem;
            background-color: #010101;
            border: 1px solid #27272a;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            border-color: #00f2fe; /* Cyan TikTok au focus */
        }
        button {
            width: 100%;
            padding: 1rem;
            background-color: #fe2c55;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            background-color: #ff0055;
            box-shadow: 0 0 15px #ff0055;
            transform: scale(1.02);
        }
        .back-btn {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #00f2fe;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            text-decoration: underline;
        }
        .status-msg {
            padding: 0.8rem;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <h2>Me Contacter 📩</h2>
        <div class="status-msg" id="status-box"></div>

        <form id="contact-form" action="https://formspree.io/f/TON_ID_FORMSPREE" method="POST" onsubmit="envoyerFormspree(event)">
            <div class="form-group">
                <label for="name">Nom / Pseudo :</label>
                <input type="text" id="name" name="name" required placeholder="Tristan">
            </div>
            <div class="form-group">
                <label for="email">Adresse Émail :</label>
                <input type="email" id="email" name="email" required placeholder="exemple@mail.com">
            </div>
            
            <div class="form-group">
                <label for="subject">Sujet du message :</label>
                <input type="text" id="subject" name="subject" required placeholder="Partenariat, Question, Bug...">
            </div>

            <div class="form-group">
                <label for="message">Message :</label>
                <textarea id="message" name="message" rows="5" required placeholder="Écris ton message ici..."></textarea>
            </div>
            <button type="submit">Envoyer le message</button>
        </form>

        <a href="/" class="back-btn">← Retour au menu principal</a>
    </div>

    <script>
        async function envoyerFormspree(event) {
            event.preventDefault(); // Empêche le rechargement
            
            const form = event.target;
            const statusBox = document.getElementById('status-box');
            const data = new FormData(form); // Récupère TOUS les champs automatiquement (y compris le sujet)

            try {
                const response = await fetch(form.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    statusBox.style.display = 'block';
                    statusBox.style.backgroundColor = '#065f46';
                    statusBox.style.color = '#34d399';
                    statusBox.innerText = "✅ Message envoyé sur ton Formspree !";
                    form.reset(); // Vide le formulaire
                } else {
                    throw new Error();
                }
            } catch (error) {
                statusBox.style.display = 'block';
                statusBox.style.backgroundColor = '#7f1d1d';
                statusBox.style.color = '#fca5a5';
                statusBox.innerText = "❌ Une erreur est survenue lors de l'envoi.";
            }

            setTimeout(() => statusBox.style.display = 'none', 4000);
        }
    </script>
</body>
</html>
