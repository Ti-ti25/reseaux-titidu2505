<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tristan | Communauté TikTok</title>
    <style>
        :root {
            --bg-color: #010101; /* Noir profond TikTok */
            --tiktok-cyan: #00f2fe; /* Cyan néon */
            --tiktok-pink: #fe2c55; /* Rose TikTok */
            --card-bg: #121212; /* Gris très sombre */
            --text-color: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        /* Conteneur principal style smartphone */
        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* Avatar avec effet néon au survol */
        .avatar-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 1.5rem auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--tiktok-cyan), var(--tiktok-pink));
            padding: 4px; /* Crée la bordure dégradée */
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #000;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .username {
            color: #a1a1aa;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            display: block;
        }

        /* Compteurs d'abonnés */
        .stats-box {
            display: flex;
            justify-content: space-around;
            background-color: var(--card-bg);
            border: 1px solid #27272a;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 2rem;
        }

        .stat-item span {
            display: block;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #71717a;
        }

        /* Liens pour la communauté */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .tiktok-link {
            background-color: var(--card-bg);
            border: 1px solid #27272a;
            color: white;
            text-decoration: none;
            padding: 1.1rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.2s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        /* Effets de bordures TikTok survol */
        .tiktok-link:hover {
            transform: scale(1.02);
            background-color: #18181b;
            border-color: var(--tiktok-cyan);
            box-shadow: -3px 0 0 var(--tiktok-cyan), 3px 0 0 var(--tiktok-pink);
        }

        /* Bouton principal mis en avant (ex: boutique, discord ou projet principal) */
        .tiktok-link.featured {
            background: linear-gradient(90deg, var(--tiktok-pink), #b91c1c);
            border: none;
        }

        .tiktok-link.featured:hover {
            box-shadow: 0 0 15px rgba(254, 44, 85, 0.5);
        }

        footer {
            margin-top: auto;
            padding-top: 3rem;
            font-size: 0.8rem;
            color: #3f3f46;
        }
    </style>
</head>
<body>

</body>
</html>
