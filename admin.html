<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Complet</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0f19;
            color: #f3f4f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .admin-container {
            width: 100%;
            max-width: 500px;
            background-color: #111827;
            border: 1px solid #1f2937;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        h1, h2 { text-align: center; color: #fe2c55; }
        h2 { font-size: 1.2rem; border-bottom: 1px solid #374151; padding-bottom: 8px; margin-top: 30px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 15px; }
        label { font-size: 0.85rem; color: #9ca3af; font-weight: 600; }
        input { background-color: #1f2937; border: 1px solid #374151; color: white; padding: 10px; border-radius: 8px; outline: none; }
        input:focus { border-color: #fe2c55; }
        
        /* Style de la gestion des boutons */
        .btn-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1f2937;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .btn-item input { flex: 1; padding: 6px; font-size: 0.9rem; }
        .action-btn { background: #374151; border: none; color: white; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .action-btn:hover { background: #4b5563; }
        .delete-btn { background: #ef4444; }
        .delete-btn:hover { background: #dc2626; }
        
        .add-btn { background: #25f4ee; color: #000; width: 100%; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .save-btn { background: #fe2c55; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #25f4ee; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>🛠️ Dashboard Admin</h1>
        
        <!-- Section 1 : Les Stats -->
        <h2>1. Modifier les Statistiques</h2>
        <div class="form-group"><label>Abonnés</label><input type="text" id="followers"></div>
        <div class="form-group"><label>J'aime</label><input type="text" id="likes"></div>
        <div class="form-group"><label>Domaine</label><input type="text" id="domaine"></div>

        <!-- Section 2 : Les Liens Dynamiques -->
        <h2>2. Gestion des Boutons Réseaux</h2>
        <div id="liste-liens"></div>
        <button class="add-btn" onclick="ajouterNouveauLien()">➕ Ajouter un bouton</button>

        <!-- Bouton Sauvegarde globale -->
        <button class="save-btn" onclick="sauvegarderTout()">💾 Enregistrer les modifications</button>
        <div id="status" style="text-align:center; margin-top:15px; font-weight:bold;"></div>

        <a href="/" class="back-link">← Retourner sur le site</a>
    </div>

    <script>
        let listeDesLiens = [];

        // Charger l'état actuel depuis le serveur
        async function chargerDonnees() {
            const res = await fetch('/api/data');
            const data = await res.json();
            
            document.getElementById('followers').value = data.stats.followers;
            document.getElementById('likes').value = data.stats.likes;
            document.getElementById('domaine').value = data.stats.domaine;
            
            listeDesLiens = data.liens;
            afficherLaListe();
        }

        // Rendu de l'interface des liens avec boutons Monter/Descendre/Supprimer
        function afficherLaListe() {
            const conteneur = document.getElementById('liste-liens');
            conteneur.innerHTML = '';
            
            listeDesLiens.forEach((lien, index) => {
                const div = document.createElement('div');
                div.className = 'btn-item';
                div.innerHTML = `
                    <input type="text" value="${lien.texte}" onchange="mettreAJourLien(${index}, 'texte', this.value)" placeholder="Nom (ex: Instagram)">
                    <input type="text" value="${lien.url}" onchange="mettreAJourLien(${index}, 'url', this.value)" placeholder="Lien (https://...)">
                    <button class="action-btn" onclick="deplacer(${index}, -1)">▲</button>
                    <button class="action-btn" onclick="deplacer(${index}, 1)">▼</button>
                    <button class="action-btn delete-btn" onclick="supprimerLien(${index})">✕</button>
                `;
                conteneur.appendChild(div);
            });
        }

        function mettreAJourLien(index, champ, valeur) {
            listeDesLiens[index][champ] = valeur;
        }

        function ajouterNouveauLien() {
            listeDesLiens.push({ id: Date.now(), texte: "Nouveau Lien", url: "https://" });
            afficherLaListe();
        }

        function supprimerLien(index) {
            listeDesLiens.splice(index, 1);
            afficherLaListe();
        }

        // Système de déplacement (tri)
        function deplacer(index, direction) {
            const cible = index + direction;
            if (cible >= 0 && cible < listeDesLiens.length) {
                const temp = listeDesLiens[index];
                listeDesLiens[index] = listeDesLiens[cible];
                listeDesLiens[cible] = temp;
                afficherLaListe();
            }
        }

        // Sauvegarde globale sur le serveur Render
        async function sauvegarderTout() {
            const status = document.getElementById('status');
            status.style.color = "orange";
            status.innerText = "Sauvegarde...";

            const maintenant = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

            const payLoad = {
                stats: {
                    followers: document.getElementById('followers').value,
                    likes: document.getElementById('likes').value,
                    domaine: document.getElementById('domaine').value,
                    date_sauvegarde: maintenant
                },
                liens: listeDesLiens
            };

            const res = await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payLoad)
            });

            if (res.ok) {
                status.style.color = "#10b981";
                status.innerText = "✅ Tout est synchronisé avec succès !";
            } else {
                status.style.color = "#ef4444";
                status.innerText = "❌ Erreur de sauvegarde.";
            }
        }

        document.addEventListener('DOMContentLoaded', chargerDonnees);
    </script>
</body>
</html>
