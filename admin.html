<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console d'Administration</title>
    <style>
        body { background-color: #0b0b0c; color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 2rem 1rem; display: flex; flex-direction: column; align-items: center; }
        .admin-box { background-color: #121214; border: 1px solid #27272a; padding: 2rem; border-radius: 12px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 2rem; }
        h2 { text-align: center; margin-bottom: 1.5rem; color: #fe2c55; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: #a1a1aa; }
        input[type="text"], input[type="password"] { width: 100%; padding: 0.7rem; border-radius: 6px; border: 1px solid #27272a; background-color: #010101; color: white; outline: none; box-sizing: border-box; }
        input:focus { border-color: #fe2c55; }
        button { width: 100%; padding: 0.8rem; background-color: #fe2c55; border: none; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 0.5rem; }
        button:hover { background-color: #dd1b43; }
        .back-btn { display: block; text-align: center; margin-top: 1.5rem; color: #71717a; text-decoration: none; font-size: 0.9rem; }
        .back-btn:hover { color: white; }
        .note { font-size: 0.8rem; color: #71717a; text-align: center; margin-top: 1rem; line-height: 1.5; }
        
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; width: 100%; max-width: 500px; }
        #admin-content { display: none; width: 100%; max-width: 500px; }
    </style>
</head>
<body>

    <div id="login-screen" class="admin-box">
        <h2>🔒 Zone Sécurisée</h2>
        <div class="form-group" style="width: 100%;">
            <label for="password">Entrez le mot de passe admin :</label>
            <input type="password" id="password" placeholder="Mot de passe">
        </div>
        <button onclick="verifierMotDePasse()">Connexion</button>
        <a href="./" class="back-btn">← Retour</a>
    </div>

    <div id="admin-content">
        <div class="admin-box">
            <h2>🛠️ Statistiques du profil</h2>
            <div class="form-group">
                <label for="followers">Thématique (Ex: GAMING) :</label>
                <input type="text" id="followers" placeholder="GAMING">
            </div>
            <div class="form-group">
                <label for="likes">Nombre d'Abonnés :</label>
                <input type="text" id="likes" placeholder="1709">
            </div>
            <div class="form-group">
                <label for="domaine">Nombre de J'aime :</label>
                <input type="text" id="domaine" placeholder="1136">
            </div>
            <button onclick="sauvegarderStats()">Enregistrer les Statistiques</button>

            <p class="note">
                Les boutons/liens du profil sont désormais fixes dans le code du site
                (fichier index.html) et ne se gèrent plus depuis cette page — ça évite
                qu'ils disparaissent en cas de souci avec la base de données.
            </p>

            <a href="./" class="back-btn">← Retour au Profil</a>
        </div>
    </div>

    <script>
        let motDePasseSaisi = "";

        async function verifierMotDePasse() {
            const saisie = document.getElementById("password").value;
            const btnConnexion = document.querySelector("#login-screen button");
            btnConnexion.disabled = true;
            btnConnexion.innerText = "Vérification...";

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: saisie })
                });

                if (res.ok) {
                    motDePasseSaisi = saisie;
                    document.getElementById("login-screen").style.display = "none";
                    document.getElementById("admin-content").style.display = "block";
                    initialiserAdmin();
                } else {
                    alert("Mot de passe incorrect ❌");
                }
            } catch (err) {
                alert("Erreur réseau, impossible de vérifier le mot de passe.");
            } finally {
                btnConnexion.disabled = false;
                btnConnexion.innerText = "Connexion";
            }
        }

        async function initialiserAdmin() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById("followers").value = stats.followers || "";
                document.getElementById("likes").value = stats.likes || "";
                document.getElementById("domaine").value = stats.domaine || "";
            } catch (err) {
                alert("Impossible de charger les statistiques actuelles depuis le serveur.");
            }
        }

        async function sauvegarderStats() {
            const followers = document.getElementById("followers").value;
            const likes = document.getElementById("likes").value;
            const domaine = document.getElementById("domaine").value;

            try {
                const res = await fetch('/api/stats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ followers, likes, domaine, password: motDePasseSaisi })
                });

                if (res.status === 401) {
                    alert("Mot de passe incorrect ❌");
                    document.getElementById("login-screen").style.display = "flex";
                    document.getElementById("admin-content").style.display = "none";
                    return;
                }

                if (!res.ok) throw new Error("Erreur serveur");

                alert("Statistiques mises à jour !");
            } catch (err) {
                alert("Erreur lors de l'enregistrement. Vérifiez votre connexion.");
            }
        }
    </script>
</body>
</html>
