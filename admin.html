<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration | Titidu2505</title>
    <style>
        body {
            background-color: #1a2436;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 500px;
            width: 100%;
            background-color: #121926;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            color: #29b6f6;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }
        .section-title {
            text-align: center;
            color: #29b6f6;
            margin: 2rem 0 1rem 0;
            font-size: 1.4rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #90a4ae;
            font-size: 0.9rem;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.75rem;
            background-color: #0d131e;
            border: 1px solid #233149;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #29b6f6;
            outline: none;
        }
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .btn-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .btn-row input {
            flex: 1;
        }
        .action-btn {
            padding: 0.6rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 35px;
        }
        .btn-up { background-color: #37474f; }
        .btn-down { background-color: #37474f; }
        .btn-delete { background-color: #ef5350; }
        
        .main-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            margin-top: 1rem;
            transition: background 0.2s;
        }
        .btn-add { background-color: #00c853; }
        .btn-add:hover { background-color: #00b0ff; }
        .btn-save { background-color: #2979ff; }
        .btn-save:hover { background-color: #2962ff; }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: #90a4ae;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: white; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Modifier mes Stats</h2>
        
        <div class="form-group">
            <label id="label-followers">Thématique (Ex: GAMING) :</label>
            <input type="text" id="input-followers" placeholder="GAMING">
        </div>
        <div class="form-group">
            <label id="label-likes">Nombre d'Abonnés :</label>
            <input type="text" id="input-likes" placeholder="1709">
        </div>
        <div class="form-group">
            <label id="label-domaine">Nombre de J'aime :</label>
            <input type="text" id="input-domaine" placeholder="1136">
        </div>

        <h2 class="section-title">Configuration des Boutons</h2>
        
        <div class="btn-list" id="buttons-container">
            <!-- Les lignes de boutons s'insèrent ici via JS -->
        </div>

        <button class="main-btn btn-add" onclick="ajouterLigneBouton()">➕ Ajouter un bouton</button>
        <button class="main-btn btn-save" onclick="enregistrerDonnees()">Enregistrer les modifications</button>
        
        <a href="index.html" class="back-link">← Retourner sur le site</a>
    </div>

    <script>
        // Ta nouvelle configuration par défaut identique à l'index
        const boutonsParDefaut = [
            { texte: "🚀 Rejoins mon serveur Discord !", url: "https://discord.gg/Uy8nTKuXK6" },
            { texte: "🔥 Mon compte TikTok", url: "https://www.tiktok.com/@titidu25050" },
            { texte: "💻 Configuration PC", url: "https://docs.google.com/document/d/1DFAE_ZSbnvDTvswvucPzSbEtJsL0wUiOP-fUlKaA3vA/edit?usp=sharing" },
            { texte: "📺 Ma chaîne YouTube", url: "https://www.youtube.com/@titidu-ix7yf" },
            { texte: "📬 Me Contacter / Partenariats", url: "contact.html" }
        ];

        function chargerDonneesAdmin() {
            // Chargement des stats (valeurs par défaut de ton index si vides)
            document.getElementById("input-followers").value = localStorage.getItem("followers") || "GAMING";
            document.getElementById("input-likes").value = localStorage.getItem("likes") || "1709";
            document.getElementById("input-domaine").value = localStorage.getItem("domaine") || "1136";

            // Utilisation de la clé synchronisée v2
            let boutons = localStorage.getItem("liste_boutons_v2");
            if (!boutons) {
                boutons = boutonsParDefaut;
            } else {
                boutons = JSON.parse(boutons);
            }

            const container = document.getElementById("buttons-container");
            container.innerHTML = "";

            boutons.forEach((bouton, index) => {
                creerLigneBoutonHTML(bouton.texte, bouton.url);
            });
        }

        function creerLigneBoutonHTML(texte = "", url = "") {
            const container = document.getElementById("buttons-container");
            
            const row = document.createElement("div");
            row.className = "btn-row";
            
            row.innerHTML = `
                <input type="text" class="btn-texte" placeholder="Texte du bouton" value="${texte}">
                <input type="text" class="btn-url" placeholder="Lien (URL)" value="${url}">
                <button class="action-btn btn-up" onclick="deplacerLigne(this, -1)">▲</button>
                <button class="action-btn btn-down" onclick="deplacerLigne(this, 1)">▼</button>
                <button class="action-btn btn-delete" onclick="supprimerLigne(this)">❌</button>
            `;
            
            container.appendChild(row);
        }

        function ajouterLigneBouton() {
            creerLigneBoutonHTML("", "");
        }

        function supprimerLigne(button) {
            button.parentElement.remove();
        }

        function deplacerLigne(button, direction) {
            const row = button.parentElement;
            if (direction === -1 && row.previousElementSibling) {
                row.parentNode.insertBefore(row, row.previousElementSibling);
            } else if (direction === 1 && row.nextElementSibling) {
                row.parentNode.insertBefore(row.nextElementSibling, row);
            }
        }

        function enregistrerDonnees() {
            // Sauvegarde des 3 blocs de stats
            localStorage.setItem("followers", document.getElementById("input-followers").value);
            localStorage.setItem("likes", document.getElementById("input-likes").value);
            localStorage.setItem("domaine", document.getElementById("input-domaine").value);

            // Récupération et sauvegarde des boutons dans la clé v2
            const rows = document.querySelectorAll(".btn-row");
            const nouvelleListe = [];

            rows.forEach(row => {
                const texte = row.querySelector(".btn-texte").value;
                const url = row.querySelector(".btn-url").value;
                if(texte.trim() !== "" || url.trim() !== "") {
                    nouvelleListe.push({ texte: texte, url: url });
                }
            });

            localStorage.setItem("liste_boutons_v2", JSON.stringify(nouvelleListe));
            alert("Modifications enregistrées avec succès !");
        }

        document.addEventListener("DOMContentLoaded", chargerDonneesAdmin);
    </script>
</body>
</html>
