<script>
    // ... Garde ta sécurité mot de passe ici ...

    document.getElementById("admin-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        
        const maintenant = new Date();
        const dateFormatee = maintenant.toLocaleDateString('fr-FR') + " à " + maintenant.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});

        const nouvellesStats = {
            followers: document.getElementById("followers").value,
            likes: document.getElementById("likes").value,
            domaine: document.getElementById("domaine").value,
            date_sauvegarde: dateFormatee
        };

        // On envoie les données au serveur Render
        await fetch('/api/stats', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(nouvellesStats)
        });

        const msgBox = document.getElementById("success-msg");
        msgBox.style.display = "block";
        setTimeout(() => { msgBox.style.display = "none"; }, 3000);
    });
</script>
