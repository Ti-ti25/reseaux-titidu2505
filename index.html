<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titidu2505 | Liens</title>
    <style>
        :root { 
            --bg-color: #000000; 
            --card-bg: #121212; 
            --btn-bg: #151517;
            --btn-border: #222224;
            --text-color: #ffffff; 
            --tiktok-cyan: #00f2fe; 
            --tiktok-pink: #fe2c55; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 3rem 1rem; 
        }

        .container { 
            max-width: 480px; 
            width: 100%; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
        }

        /* Avatar avec dégradé circulaire comme sur l'image */
        .avatar-container { 
            position: relative; 
            width: 130px; 
            height: 130px; 
            margin: 0 auto 1.5rem auto; 
        }
        .avatar { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            background: linear-gradient(135deg, var(--tiktok-cyan), var(--tiktok-pink)); 
            padding: 3px; 
        }
        .avatar img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            background-color: #000; 
        }

        h1 { 
            font-size: 1.8rem; 
            font-weight: 700; 
            margin-bottom: 0.4rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        /* Style du pseudo cliquable */
        .username-container { margin-bottom: 2rem; }
        .username { 
            color: #8e8e93; 
            font-size: 0.95rem; 
            cursor: pointer; 
            transition: all 0.2s ease;
            position: relative;
            padding: 4px 8px;
            border-radius: 6px;
        }
        .username:hover { 
            color: #ffffff; 
            background-color: #1c1c1e;
        }

        /* Bulle Copié ! */
        .tooltip-copy {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--tiktok-cyan);
            color: #000000;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .tooltip-copy.show { opacity: 1; }

        /* Bloc des Statistiques fidèles à la photo */
        .stats-box { 
            display: flex; 
            justify-content: space-around; 
            background-color: var(--card-bg); 
            border: 1px solid #1c1c1e; 
            border-radius: 16px; 
            padding: 1.2rem; 
            margin-bottom: 2.5rem; 
        }
        .stat-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-value { 
            font-weight: 700; 
            font-size: 1.3rem; 
            color: #ffffff; 
            text-transform: uppercase;
        }
        .stat-label { 
            font-size: 0.8rem; 
            color: #636366; 
            margin-top: 0.3rem; 
        }

        /* Container des Liens */
        .links-container { 
            display: flex; 
            flex-direction: column; 
            gap: 0.9rem; 
        }
        
        .tiktok-link { 
            background-color: var(--btn-bg); 
            border: 1px solid var(--btn-border); 
            color: white; 
            text-decoration: none; 
            padding: 1.1rem; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 0.95rem;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.6rem; 
            transition: all 0.2s ease; 
        }
        
        .tiktok-link:hover { 
            transform: scale(1.015); 
            background-color: #1c1c1e;
            border-color: #3a3a3c;
        }

        footer { 
            margin-top: auto; 
            padding-top: 4rem; 
            font-size: 0.75rem; 
            color: #2c2c2e; 
            position: relative; 
        }
        .secret-admin-btn {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: transparent;
            border-radius: 50%;
            margin-left: 5px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Avatar avec l'image voilas.jpg (ou voila.png) -->
        <div class="avatar-container">
            <div class="avatar">
                <img src="voila.jpg" alt="Profil">
            </div>
        </div>
        
        <h1>Titidu2505 🌐</h1>
        
        <div class="username-container">
            <span class="username" id="copy-username" title="Cliquer pour copier">
                @titidu25050
                <span class="tooltip-copy" id="tooltip">Copié !</span>
            </span>
        </div>

        <!-- Section Statistiques -->
        <div class="stats-box">
            <div class="stat-item">
                <span class="stat-value" id="view-followers">GAMING</span>
                <span class="stat-label">Theme</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="view-likes">1709</span>
                <span class="stat-label">Abonné</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="view-domaine">1136</span>
                <span class="stat-label">J'aime</span>
            </div>
        </div>

        <!-- Liste des boutons de l'image -->
        <div class="links-container" id="links-wrapper"></div>

        <footer>
            <p>&copy; 2026 - Tristan. Tous droits réservés.<a href="admin.html" class="secret-admin-btn"></a></p>
        </footer>
    </div>

    <script>
        // Boutons configurés par défaut exactement comme sur la capture d'écran
        const boutonsParDefaut = [
            { texte: "🔥 Mon compte TikTok", url: "https://www.tiktok.com/@titidu25050" },
            { texte: "🚀 Rejoins mon serveur Discord !", url: "https://discord.gg/" },
            { texte: "🎮 Instant Gaming", url: "https://www.instant-gaming.com/" },
            { texte: "💻 Configuration PC", url: "https://amazon.fr" },
            { texte: "🎬 Mon Dernier Clip", url: "https://youtube.com" },
            { texte: "📬 Me Contacter / Partenariats", url: "contact.html" }
        ];

        function chargerDonnees() {
            // Permet à l'admin de modifier dynamiquement les compteurs s'ils existent en LocalStorage
            if(localStorage.getItem("followers")) {
                document.getElementById("view-followers").innerText = localStorage.getItem("followers");
                document.getElementById("view-likes").innerText = localStorage.getItem("likes");
                document.getElementById("view-domaine").innerText = localStorage.getItem("domaine");
            }

            let boutons = localStorage.getItem("liste_boutons");
            if (!boutons) {
                boutons = boutonsParDefaut;
                localStorage.setItem("liste_boutons", JSON.stringify(boutonsParDefaut));
            } else {
                boutons = JSON.parse(boutons);
            }

            const wrapper = document.getElementById("links-wrapper");
            wrapper.innerHTML = "";

            boutons.forEach(bouton => {
                const a = document.createElement("a");
                a.href = bouton.url;
                a.className = "tiktok-link";
                if(bouton.url.startsWith("http")) {
                    a.target = "_blank";
                }
                a.innerText = bouton.texte;
                wrapper.appendChild(a);
            });
        }

        // Script de copie du pseudo dans le presse-papier
        document.getElementById("copy-username").addEventListener("click", function() {
            const pseudo = "@titidu25050";
            navigator.clipboard.writeText(pseudo).then(() => {
                const tooltip = document.getElementById("tooltip");
                tooltip.classList.add("show");
                setTimeout(() => {
                    tooltip.classList.remove("show");
                }, 1500);
            }).catch(err => {
                console.error("Erreur de copie : ", err);
            });
        });

        document.addEventListener("DOMContentLoaded", chargerDonnees);
        window.addEventListener("storage", chargerDonnees);
    </script>
</body>
</html>
