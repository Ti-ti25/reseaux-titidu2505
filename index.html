<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tristan | Communauté TikTok</title>
    <style>
        :root { 
            --bg-color: #010101; 
            --tiktok-cyan: #00f2fe; 
            --tiktok-pink: #fe2c55; 
            --card-bg: #121212; 
            --text-color: #ffffff; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 2rem 1rem; }
        .container { max-width: 450px; width: 100%; text-align: center; display: flex; flex-direction: column; min-height: 85vh; }
        .avatar-container { position: relative; width: 110px; height: 110px; margin: 0 auto 1.5rem auto; }
        .avatar { width: 100%; height: 100%; border-radius: 50%; background: linear-gradient(135deg, var(--tiktok-cyan), var(--tiktok-pink)); padding: 4px; }
        .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background-color: #000; }
        h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 0.3rem; }
        
        /* STYLE DU PSEUDO CLIQUABLE */
        /* Centrage du container */
        .username-container { margin-bottom: 1.5rem; }

        /* Style ciblé UNIQUEMENT sur le @titidu25050 */
        .username { 
            color: #a1a1aa; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: all 0.2s ease;
            position: relative;
            padding: 2px 6px;
            border-radius: 4px;
        }
        .username:hover { 
            color: #ffffff; 
            background-color: #1c1c1e;
        }
        /* Message "Copié !" */
        .tooltip-copy {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--tiktok-cyan);
            color: #000000;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .tooltip-copy.show {
            opacity: 1;
        }

        .stats-box { display: flex; justify-content: space-around; background-color: var(--card-bg); border: 1px solid #27272a; border-radius: 16px; padding: 1rem; margin-bottom: 2rem; }
        .stat-item span { display: block; }
        .stat-value { font-weight: 700; font-size: 1.25rem; color: #ffffff; transition: color 0.3s ease; }
        .stat-label { font-size: 0.85rem; color: #71717a; margin-top: 0.2rem; }
        .links-container { display: flex; flex-direction: column; gap: 1rem; }
        
        .tiktok-link { 
            background-color: var(--card-bg); 
            border: 1px solid #27272a; 
            color: white; 
            text-decoration: none; 
            padding: 1.1rem; 
            border-radius: 12px; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 0.5rem; 
            transition: all 0.2s ease; 
        }
        
        .tiktok-link:hover { 
            transform: scale(1.02); 
            background: #ff0055; 
            border-color: #ff0055;
            box-shadow: 0 0 15px #ff0055; 
        }

        footer { margin-top: auto; padding-top: 3rem; font-size: 0.8rem; color: #3f3f46; position: relative; }
        .last-update { font-size: 0.75rem; color: #71717a; margin-top: 0.5rem; font-style: italic; }

        .secret-admin-btn {
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: #1c1c1e;
            border-radius: 50%;
            text-decoration: none;
            margin-left: 5px;
            vertical-align: middle;
            cursor: default;
        }
        .secret-admin-btn:hover { background-color: #3a3a3c; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar-container"><div class="avatar"><img src="https://via.placeholder.com/150" alt="Profil"></div></div>
        <h1>Titidu2505 🌐</h1>
        
        <!-- On entoure juste le @titidu25050 avec une span pour limiter la zone -->
        <div class="username-container">
            <span class="username" id="copy-username" title="Cliquer pour copier">
                @titidu25050
                <span class="tooltip-copy" id="tooltip">Copié !</span>
            </span>
        </div>

        <div class="stats-box">
            <div class="stat-item"><span class="stat-value" id="view-followers">150</span><span class="stat-label">Suivi</span></div>
            <div class="stat-item"><span class="stat-value" id="view-likes">10K</span><span class="stat-label">Abonné</span></div>
            <div class="stat-item"><span class="stat-value" id="view-domaine">150K</span><span class="stat-label">J'aime</span></div>
        </div>

        <div class="links-container" id="links-wrapper"></div>

        <footer>
            <p>&copy; 2026 - Tristan. Tous droits réservés.<a href="admin.html" class="secret-admin-btn"></a></p>
            <p class="last-update" id="view-date">Aucune sauvegarde détectée</p>
        </footer>
    </div>

    <script>
        const boutonsParDefaut = [
            { texte: "🚀 Rejoins mon serveur Discord !", url: "https://discord.gg/tonlink" },
            { texte: "📺 Ma chaîne YouTube", url: "https://youtube.com/" },
            { texte: "📩 Contact Pro / Partenariats", url: "contact.html" }
        ];

        function chargerDonnees() {
            if(localStorage.getItem("followers")) {
                document.getElementById("view-followers").innerText = localStorage.getItem("followers");
                document.getElementById("view-likes").innerText = localStorage.getItem("likes");
                document.getElementById("view-domaine").innerText = localStorage.getItem("domaine");
                document.getElementById("view-date").innerText = "Dernière mise à jour : le " + localStorage.getItem("date_sauvegarde");
            }

            let boutons = localStorage.getItem("liste_boutons");
            if (!boutons) {
                boutons = boutonsParDefaut;
                localStorage.setItem("liste_boutons", JSON.stringify(boutonsParDefaut));
            } else {
                boutons = JSON.parse(boutons);
            }

            const wrapper = document.getElementById("links-wrapper");
            wrapper.innerHTML = "";

            boutons.forEach(bouton => {
                const a = document.createElement("a");
                a.href = bouton.url;
                a.className = "tiktok-link";
                if(bouton.url.startsWith("http")) {
                    a.target = "_blank";
                }
                a.innerText = [...bouton.texte].join("");
                wrapper.appendChild(a);
            });
        }

        // SCRIPT POUR COPIER LE PSEUDO
        document.getElementById("copy-username").addEventListener("click", function() {
            // On récupère le texte du pseudo (sans les espaces ou balises enfants)
            const pseudo = "@titidu25050";
            
            // Utilisation de l'API moderne du navigateur pour copier le texte
            navigator.clipboard.writeText(pseudo).then(() => {
                const tooltip = document.getElementById("tooltip");
                
                // On affiche la bulle "Copié !"
                tooltip.classList.add("show");
                
                // On la cache automatiquement après 1.5 seconde
                setTimeout(() => {
                    tooltip.classList.remove("show");
                }, 1500);
            }).catch(err => {
                console.error("Erreur lors de la copie : ", err);
            });
        });

        document.addEventListener("DOMContentLoaded", chargerDonnees);
        window.addEventListener("storage", chargerDonnees);
    </script>
</body>
</html>
