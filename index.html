<script>
    async function chargerDonneesDuServeur() {
        try {
            const reponse = await fetch('/api/stats');
            const data = await reponse.json();
            document.getElementById("view-followers").innerText = data.followers;
            document.getElementById("view-likes").innerText = data.likes;
            document.getElementById("view-domaine").innerText = data.domaine;
            document.getElementById("view-date").innerText = "Mis à jour : " + data.date_sauvegarde;
        } catch (erreur) {
            console.error("Erreur serveur:", erreur);
        }
    }

    document.addEventListener("DOMContentLoaded", chargerDonneesDuServeur);
    // Vérifie toutes les 3 secondes si tu as changé un truc dans l'admin
    setInterval(chargerDonneesDuServeur, 3000);
</script>
